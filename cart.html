<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart – Harvel Electric</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#fbf8ff;color:#1a1a2e;}
    .site-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(91,33,182,.08);}
    .header-container{max-width:1280px;margin:0 auto;padding:0 24px;height:70px;display:flex;align-items:center;justify-content:space-between;}
    .header-logo{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;}
    .header-logo-text{display:flex;flex-direction:column;}
    .header-logo-text span:first-child{font-size:18px;font-weight:800;color:#1a1a2e;letter-spacing:-.5px;}
    .header-logo-text span:last-child{font-size:12px;font-weight:500;color:#7c3aed;margin-left:4px;letter-spacing:.05em;}
    .logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#5b21b6,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:18px;box-shadow:0 4px 12px rgba(91,33,182,.35);}
    .header-nav{display:flex;gap:36px;align-items:center;}
    .nav-link-h{position:relative;font-weight:500;color:#4b5563;transition:color .2s;padding:6px 0;cursor:pointer;text-decoration:none;}
    .nav-link-h::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:#5b21b6;transition:width .25s;border-radius:2px;}
    .nav-link-h:hover,.nav-link-h.active{color:#5b21b6;}
    .nav-link-h:hover::after,.nav-link-h.active::after{width:100%;}
    .header-actions{display:flex;align-items:center;gap:12px;}
    .btn-primary{display:inline-flex;align-items:center;gap:8px;background:#5b21b6;color:white;padding:14px 28px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;transition:all .2s;box-shadow:0 8px 24px rgba(91,33,182,.4);cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
    .btn-primary:hover{background:#4c1d95;transform:translateY(-2px);}
    .menu-toggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;}
    .mobile-actions{display:none;flex-direction:column;gap:12px;}
    .header-cart{display:flex;align-items:center;cursor:pointer;margin-left:10px;position:relative;}
    .header-cart svg{width:24px;height:24px;color:#1a1a2e;transition:color .2s;}
    .header-cart:hover svg{color:#5b21b6;}
    #cartCount{position:absolute;top:3px;right:3px;background:#5b21b6;color:#fff;border-radius:50%;padding:2px 6px;font-size:9px;font-weight:800;display:none;}
    @media(max-width:1024px){
      .header-nav{display:none;flex-direction:column;gap:24px;position:fixed;top:70px;right:0;width:240px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-left:1px solid rgba(91,33,182,.08);padding:24px;z-index:200;}
      .header-nav.active{display:flex;}
      .menu-toggle{display:block;}
      .desktop-only{display:none;}
      .mobile-actions{display:flex;}
    }

    .cart-page{max-width:1100px;margin:0 auto;padding:40px 24px;}
    .cart-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;margin-bottom:32px;}
    .cart-layout{display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start;}
    @media(max-width:900px){.cart-layout{grid-template-columns:1fr;}}

    .cart-items{display:flex;flex-direction:column;gap:16px;}
    .cart-item{background:white;border-radius:16px;padding:16px;display:flex;gap:16px;align-items:center;border:1px solid #f0e8ff;transition:box-shadow .2s;}
    .cart-item:hover{box-shadow:0 4px 20px rgba(91,33,182,.1);}
    .cart-item-img{width:80px;height:80px;border-radius:12px;background:#f3e8ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .cart-item-img img{width:100%;height:100%;object-fit:contain;}
    .cart-item-img .img-placeholder{width:36px;height:36px;color:#c4b5fd;}
    .cart-item-info{flex:1;min-width:0;}
    .cart-item-name{font-weight:700;font-size:15px;color:#1a1a2e;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cart-item-price{font-size:14px;color:#7c3aed;font-weight:600;}
    .cart-item-actions{display:flex;align-items:center;gap:10px;margin-top:8px;}
    .qty-ctrl{display:flex;align-items:center;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;}
    .qty-btn{width:32px;height:32px;background:none;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5b21b6;font-weight:700;}
    .qty-btn:hover{background:#f3e8ff;}
    .qty-num{width:36px;text-align:center;font-weight:700;font-size:14px;}
    .remove-btn{background:none;border:none;cursor:pointer;color:#ef4444;font-size:13px;font-weight:600;padding:4px 8px;border-radius:6px;transition:background .2s;}
    .remove-btn:hover{background:#fee2e2;}
    .item-subtotal{font-weight:700;font-size:15px;color:#1a1a2e;min-width:90px;text-align:right;}

    .cart-empty{text-align:center;padding:80px 20px;}
    .cart-empty-icon{font-size:64px;margin-bottom:16px;}
    .cart-empty h2{font-family:'Fraunces',serif;font-size:1.6rem;margin-bottom:8px;}
    .cart-empty p{color:#6b7280;margin-bottom:24px;}

    .cart-summary{background:white;border-radius:20px;padding:24px;border:1px solid #f0e8ff;position:sticky;top:90px;}
    .summary-title{font-size:18px;font-weight:800;margin-bottom:20px;color:#1a1a2e;}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;color:#4b5563;}
    .summary-row.total{font-size:18px;font-weight:800;color:#1a1a2e;border-top:2px solid #f0e8ff;padding-top:16px;margin-top:8px;}
    .summary-row.delivery{color:#16a34a;font-weight:600;}

    .coupon-box{background:#f3e8ff;border-radius:12px;padding:16px;margin:16px 0;}
    .coupon-label{font-size:13px;font-weight:700;color:#5b21b6;margin-bottom:8px;}
    .coupon-input-row{display:flex;gap:8px;}
    .coupon-input{flex:1;border:1px solid #d8b4fe;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;}
    .coupon-input:focus{border-color:#7c3aed;}
    .coupon-apply-btn{background:#5b21b6;color:white;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;transition:background .2s;}
    .coupon-apply-btn:hover{background:#4c1d95;}
    .coupon-msg{font-size:12px;margin-top:6px;font-weight:600;}
    .coupon-msg.ok{color:#16a34a;}
    .coupon-msg.err{color:#ef4444;}

    .checkout-btn{width:100%;padding:16px;font-size:16px;border-radius:12px;margin-top:16px;}

    .toast-msg{position:fixed;bottom:28px;right:28px;background:#5b21b6;color:white;padding:14px 24px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 32px rgba(91,33,182,.4);z-index:9999;transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275);}
    .toast-msg.show{transform:translateY(0);opacity:1;}

    @media(max-width:640px){
      .cart-page{padding:24px 16px;}
      .cart-title{font-size:1.5rem;margin-bottom:20px;}
      .cart-item{flex-wrap:wrap;padding:14px;}
      .cart-item img{width:64px;height:64px;}
      .cart-item-info{min-width:0;flex:1;}
      .item-subtotal{min-width:auto;text-align:left;width:100%;padding-top:8px;border-top:1px solid #f0e8ff;margin-top:8px;}
      .cart-summary{position:static;border-radius:16px;}
      .summary-title{font-size:16px;}
      .coupon-input-row{flex-direction:column;}
      .coupon-apply-btn{width:100%;}
    }
    @media(max-width:400px){
      .cart-item img{width:52px;height:52px;border-radius:8px;}
      .cart-item-name{font-size:13px;}
      .cart-item-price{font-size:12px;}
      .qty-btn{width:28px;height:28px;font-size:14px;}
      .qty-num{width:28px;font-size:12px;}
    }
  </style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="header.css">
</head>
<body>
<header class="site-header" id="hdr">
  <div class="hdr">
    <a href="index.html" class="logo">
      <div class="logo-mark">H</div>
      <div class="logo-text">
        <span class="logo-name">HARVEL</span>

    <nav class="nav" id="mainNav">

      </div>
      <button class="burger" id="burger"><span></span><span></span><span></span></button>

  </div>
  <div class="mob" id="mob">
    <a href="index.html" class="nav-link" data-page="index">Home</a>
    <a href="product-1.html" class="nav-link" data-page="product-1">Products</a>
    <a href="about.html" class="nav-link" data-page="about">About Us</a>
    <a href="contact.html" class="nav-link" data-page="contact">Contact</a>
    <a href="faq.html" class="nav-link" data-page="faq">FAQ</a>
    <div class="mob-btns" id="mobAuthBtns">
      <button class="btn btn-gp" onclick="openAuthModal('login')">Login</button>
      <button class="btn btn-p" onclick="openAuthModal('signup')">Sign Up</button>
    </div>
    <div id="mobProfileArea" style="display:none;margin-top:16px;padding:14px;background:var(--bgs);border-radius:var(--r2)">
      <div style="font-weight:800;font-size:14px;color:var(--ink)" id="mobPdName">User</div>
      <div style="font-size:12px;color:var(--inkl);margin-bottom:12px" id="mobPdEmail">email</div>
      <button class="btn btn-gp btn-sm" style="width:100%;justify-content:center" onclick="logoutUser()">Sign Out</button>

</header>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay" onclick="handleOverlayClick(event)">
  <div class="auth-modal" id="authModal">

      <button class="auth-close" onclick="closeAuthModal()">&#x2715;</button>

</div>
<div class="auth-overlay" id="profileOverlay" onclick="handleProfileOverlayClick(event)">
  <div class="auth-modal" id="profileModal">
    <div class="auth-modal-head" style="background:linear-gradient(135deg,#0f0e24,#2a1060)">
      <button class="auth-close" onclick="closeProfileModal()">&#x2715;</button>
      <div class="logo-mark" style="width:38px;height:38px;font-size:17px;margin-bottom:14px" id="profileModalAvatar">U</div>

      <div class="auth-field"><div class="auth-label">Email</div><div id="piEmail" style="padding:12px 16px;background:var(--bgs);border-radius:var(--r2);font-size:14px;color:var(--ink)"></div></div>
      <div class="auth-field"><div class="auth-label">Phone Number</div><div id="piPhone" style="padding:12px 16px;background:var(--bgs);border-radius:var(--r2);font-size:14px;color:var(--ink)"></div></div>
      <div class="auth-field"><div class="auth-label">Member Since</div><div id="piDate" style="padding:12px 16px;background:var(--bgs);border-radius:var(--r2);font-size:14px;color:var(--ink)"></div></div>
      <button class="auth-submit" onclick="logoutUser();closeProfileModal()" style="background:#dc2626;box-shadow:0 6px 22px rgba(220,38,38,.3);margin-top:4px">Sign Out</button>
    </div>
  </div>
</div>
<div class="hdr-toast" id="hdrToast">
  <svg viewBox="0 0 24 24" width="16" height="16"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <span id="hdrToastMsg"></span>
</div>

<div class="cart-page">
  <h1 class="cart-title">🛒 Your Cart</h1>
  <div id="cartContent"></div>
</div>

<div class="toast-msg" id="toastMsg"></div>

<script>
const PRODUCT_IMAGES = {
  1:'product images/LED tvs/smart 1.1.webp', 2:'product images/LED tvs/smart 2.1.webp', 3:'product images/LED tvs/smart 3.1.webp',
  4:'product images/LED tvs/standard 1.1.webp', 5:'product images/LED tvs/standard 2.1.webp', 6:'product images/LED tvs/standard 3.1.webp',
  7:'product images/geysers/geyser 2.webp', 8:'product images/geysers/geyser 3.webp', 9:'product images/geysers/geyser 4.1.webp',
  10:'product images/geysers/geyser 5.1.webp', 11:'product images/geysers/geyser 6.1.webp', 12:'product images/geysers/geyser  7.webp',
  13:'product images/fans/ceiling fan 1.2.png', 14:'product images/fans/ceiling fan 2.2.png', 15:'product images/fans/ceiling fan 3.2.webp',
  16:'product images/fans/ceiling fan 5.1.webp', 17:'product images/fans/ceiling fan 6.2.png',
  18:'product images/fridges/double door/double door 1.1.webp', 19:'product images/fridges/double door/double door 2.1.webp', 20:'product images/fridges/double door/double door 3.1.webp',
  21:'product images/fridges/deep freezer/deep freezer 1.2.webp', 22:'product images/fridges/deep freezer/deep freezer 2.2.webp', 23:'product images/fridges/deep freezer/deep freezer 3.2.webp',
  24:'product images/fridges/single door/fridge 1.2.webp', 25:'product images/fridges/single door/fridge 2.2.webp', 26:'product images/fridges/single door/fridge 3.2.webp',
  27:'product images/ac/wall ac/ac 2.2.webp', 28:'product images/ac/wall ac/ac 3.2.webp', 29:'product images/ac/wall ac/ac 4.2.webp', 30:'product images/ac/wall ac/ac 4.3.webp',
  31:'product images/ac/floor stand ac/floor standing ac 1.1.webp', 32:'product images/ac/floor stand ac/floor standing ac 2.2.webp', 33:'product images/ac/floor stand ac/floor standing ac 3.1.webp',
  34:'product images/washing machines/front load automatic/front load automatic 1.1.webp', 35:'product images/washing machines/front load automatic/front load automatic 2.1.webp',
  36:'product images/washing machines/front load automatic/front load automatic 3.2.webp', 37:'product images/washing machines/front load automatic/front load automatic 4.2.webp',
  38:'product images/washing machines/front load automatic/front load automatic 5.3.webp',
  39:'product images/washing machines/Top load automatic/top load automatic 1.1.webp', 40:'product images/washing machines/Top load automatic/top load automatic 2.1.webp',
  41:'product images/washing machines/Top load automatic/top load automatic 4.1.webp', 42:'product images/washing machines/Top load automatic/top load automatic 5.1.webp',
  43:'product images/washing machines/semi automatic/semi auto washing machine 1.1.webp', 44:'product images/washing machines/semi automatic/semi auto washing machine 2.1.webp',
  45:'product images/washing machines/semi automatic/semi auto washing machine 3.2.webp', 46:'product images/washing machines/semi automatic/semi auto washing machine single 1.2.webp',
  47:'product images/washing machines/semi automatic/semi auto washing machine single 2.2.webp'
};
const COUPONS = { 'HARVEL10': 10, 'SAVE15': 15, 'NEWUSER20': 20 };
const DELIVERY_COST = 250;
let appliedDiscount = 0;

function getCart(){ return JSON.parse(localStorage.getItem('harvelCart')||'[]'); }
function saveCart(c){ localStorage.setItem('harvelCart',JSON.stringify(c)); renderCart(); updateCartCount(); }
function updateCartCount(){
  const c=getCart(); const t=c.reduce((s,i)=>s+i.qty,0);
  const el=document.getElementById('cartCount');
  if(el){ el.textContent=t; el.style.display=t>0?'block':'none'; }
}

function renderCart(){
  const cart=getCart();
  const el=document.getElementById('cartContent');
  if(!cart.length){
    el.innerHTML=`<div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <h2>Your cart is empty</h2>
      <p>Add some products and come back!</p>
      <a href="product-1.html" class="btn-primary" style="display:inline-flex;">Browse Products</a>
    </div>`;
    return;
  }
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discount=Math.round(subtotal*appliedDiscount/100);
  const total=subtotal-discount+DELIVERY_COST;
  el.innerHTML=`
    <div class="cart-layout">
      <div>
        <div class="cart-items" id="cartItems"></div>
      </div>
      <div class="cart-summary">
        <div class="summary-title">Order Summary</div>
        <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span>Rs. ${subtotal.toLocaleString()}</span></div>
        ${discount>0?`<div class="summary-row" style="color:#16a34a;font-weight:600;"><span>Discount Applied</span><span>-Rs. ${discount.toLocaleString()}</span></div>`:''}
        <div class="summary-row delivery"><span>🚚 Delivery</span><span>Rs. ${DELIVERY_COST}</span></div>
        <div class="summary-row total"><span>Total</span><span>Rs. ${total.toLocaleString()}</span></div>
        <div class="coupon-box">
          <div class="coupon-label">🏷️ Have a coupon?</div>
          <div class="coupon-input-row">
            <input class="coupon-input" id="couponInput" placeholder="Enter code" value="${window._couponCode||''}">
            <button class="coupon-apply-btn" onclick="applyCoupon()">Apply</button>
          </div>
          <div class="coupon-msg" id="couponMsg"></div>
        </div>
        <button class="btn-primary checkout-btn" onclick="goCheckout()">Proceed to Checkout →</button>
      </div>
    </div>`;
  const itemsEl=document.getElementById('cartItems');
  cart.forEach((item,idx)=>{
    const d=document.createElement('div');
    d.className='cart-item';
    const imgSrc = item.image || PRODUCT_IMAGES[item.id] || '';
    const imgHtml = imgSrc
      ? `<img src="${imgSrc}" alt="${item.name}">`
      : `<svg class="img-placeholder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="3"/><circle cx="8.5" cy="9.5" r="2"/><path d="m21 15-5-5L5 21"/></svg>`;
    d.innerHTML=`
      <div class="cart-item-img">${imgHtml}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">Rs. ${item.price.toLocaleString()} each</div>
        <div class="cart-item-actions">
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem(${idx})">✕ Remove</button>
        </div>
      </div>
      <div class="item-subtotal">Rs. ${(item.price*item.qty).toLocaleString()}</div>`;
    itemsEl.appendChild(d);
  });
  if(window._couponCode && appliedDiscount>0){
    document.getElementById('couponMsg').textContent='✓ '+window._couponCode+' applied ('+appliedDiscount+'% off)';
    document.getElementById('couponMsg').className='coupon-msg ok';
  }
}

function changeQty(idx,d){
  let c=getCart(); c[idx].qty+=d;
  if(c[idx].qty<1)c[idx].qty=1;
  saveCart(c);
}
function removeItem(idx){
  let c=getCart(); c.splice(idx,1); saveCart(c);
  showToast('Item removed from cart');
}
function applyCoupon(){
  const code=document.getElementById('couponInput').value.trim().toUpperCase();
  const msg=document.getElementById('couponMsg');
  if(COUPONS[code]){
    appliedDiscount=COUPONS[code];
    window._couponCode=code;
    msg.textContent='✓ '+code+' applied! '+appliedDiscount+'% off';
    msg.className='coupon-msg ok';
    renderCart();
    showToast('Coupon applied — '+appliedDiscount+'% off!');
  } else {
    msg.textContent='✗ Invalid coupon code';
    msg.className='coupon-msg err';
    appliedDiscount=0;
    window._couponCode='';
  }
}
function goCheckout(){
  const cart=getCart();
  if(!cart.length){showToast('Your cart is empty');return;}
  sessionStorage.setItem('checkoutCart',JSON.stringify(cart));
  sessionStorage.setItem('checkoutDiscount',appliedDiscount);
  sessionStorage.setItem('checkoutCoupon',window._couponCode||'');
  window.location='checkout.html?mode=cart';
}
function showToast(msg){
  const t=document.getElementById('toastMsg');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.onload=()=>{ updateCartCount(); renderCart(); };
</script>
<script src="auth.js"></script>
</body>
</html>
